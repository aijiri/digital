<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Practice Page</title>

  <!-- External CSS: Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet" />

  <!-- Internal CSS with colors -->
  <style>
    body {
      background-color: #F5F0E8;
      color: #2C2A3A;
      font-family: 'Noto Serif JP', serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
    }

    h2 {
      color: #6B8FA3;
      border-bottom: 1px solid #C5BDAF;
      padding-bottom: 0.3rem;
      margin: 2rem 0 1rem;
    }

    /* Image */
    img {
      max-width: 360px;
      border: 3px solid #C5BDAF;
      border-radius: 4px;
      display: block;
    }

    /* Table */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background-color: #6B8FA3;
      color: #ffffff;
    }

    th, td {
      padding: 0.6rem 1rem;
      text-align: left;
      border: 1px solid #C5BDAF;
    }

    tbody tr:nth-child(even) {
      background-color: #E8EDF0;
    }

    /* Form */
    form {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-width: 400px;
    }

    label {
      color: #6B8FA3;
      font-size: 0.9rem;
      margin-top: 0.4rem;
    }

    input, select {
      padding: 0.5rem;
      border: 1px solid #C5BDAF;
      border-radius: 3px;
      font-family: inherit;
    }

    button[type="submit"] {
      margin-top: 0.5rem;
      padding: 0.5rem 1.2rem;
      background-color: #C97B4B;
      color: #ffffff;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      align-self: flex-start;
      font-family: inherit;
    }

    /* iframes */
    iframe {
      display: block;
      width: 100%;
      border: 2px solid #C5BDAF;
      border-radius: 4px;
      margin-bottom: 1.5rem;
    }

    .video-wrap {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      height: 0;
    }

    .video-wrap iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <!-- FIX 1: pngtree.com is a webpage, not an image file.
       src must end in .jpg or .png — replaced with a real dog image. -->
  <h2>Image</h2>
  <img
    src="bg-coffee-shop.jpg"
    alt="coffee shop"
    width="360" />

  <!-- No fixes needed in the table -->
  <h2>Score Table</h2>
  <table>
    <thead>
      <tr>
        <th>Name</th>  <th>Country</th>  <th>Score</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Amelia</td>  <td>Japan</td>  <td>98</td>
      </tr>
      <tr>
        <td>Kenji</td>  <td>USA</td>  <td>87</td>
      </tr>
    </tbody>
  </table>

  <!-- No fixes needed in the form -->
  <h2>Contact Form</h2>
  <form action="/submit" method="post">
    <label for="name">Your Name</label>
    <input type="text" id="name" name="name" />

    <label for="email">Email</label>
    <input type="email" id="email" name="email" />

    <label for="level">Level</label>
    <select id="level" name="level">
      <option value="beginner">Beginner</option>
      <option value="advanced">Advanced</option>
    </select>

    <button type="submit">Send</button>
  </form>

  <!-- FIX 2: Added title attribute (accessibility requirement) -->
  <h2>Embedded Page (KUFS)</h2>
  <iframe
    src="https://gyouseki.kufs.ac.jp/kufshp/KgApp?resId=S001125&Language=2"
    height="400"
    title="KUFS Faculty Research"
    frameborder="0">
  </iframe>

  <!-- FIX 3: Added frameborder="0", made responsive with wrapper div -->
  <h2>YouTube Video</h2>
  <div class="video-wrap">
    <iframe
      src="https://www.youtube.com/embed/dQw4w9WgXcQ"
      title="YouTube video player"
      frameborder="0"
      allowfullscreen>
    </iframe>
  </div>

  <!-- FIX 4: "pb=..." was a placeholder — replaced with real Nagoya embed URL.
       Also added frameborder="0" and allowfullscreen. -->
  <h2>Google Map — Nagoya</h2>
  <iframe
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d52183.96844108682!2d136.87565439999998!3d35.1814464!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x60037a1a93f2a6b5%3A0x66c98a3602cf1f5!2sNagoya%2C%20Aichi!5e0!3m2!1sen!2sjp!4v1718000000000"
    height="300"
    title="Map of Nagoya"
    frameborder="0"
    allowfullscreen>
  </iframe>

</body>
</html>
